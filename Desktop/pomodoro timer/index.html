<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Focus Pomodoro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="dashboard-container">
    <div class="background-effect"></div>
    <div class="timer-card">
      
      <!-- Mode Tabs -->
      <nav class="mode-tabs">
        <label>
          <input type="radio" name="mode" checked>
          <span class="tab">Pomodoro</span>
        </label>
        <label>
          <input type="radio" name="mode">
          <span class="tab">Short Break</span>
        </label>
        <label>
          <input type="radio" name="mode">
          <span class="tab">Long Break</span>
        </label>
      </nav>

      <!-- Timer Display -->
      <div class="timer-display">
        <h1>25:00</h1>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="btn btn-primary">Start</button>
        <button class="btn btn-secondary">Pause</button>
        <button class="btn btn-icon" aria-label="Reset">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            <path d="M3 3v5h5"></path>
          </svg>
        </button>
      </div>

      <!-- Task Input -->
      <div class="task-input-container">
        <input type="text" class="task-input" placeholder="What are you working on?">
      </div>

      <!-- Session Info -->
      <div class="session-info">
        <p>Session 1 / 4</p>
      </div>

    </div>
  </div>

</body>
</html>
